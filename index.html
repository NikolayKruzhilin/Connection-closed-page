<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Доступ ограничен</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 720px;
      padding: 36px 32px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      text-align: center;
    }

    /* Верхняя иконка */
    .icon-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .icon-wrapper img {
      width: 88px;      /* фиксированный размер */
      height: 88px;
      object-fit: contain;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 16px;
      color: #4b5563;
      margin-bottom: 24px;
      line-height: 1.5;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 20px 0;
    }

    .contacts {
      display: flex;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
    }

    .block {
      text-align: left;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label img {
      width: 14px;
      height: 14px;
    }

    .value {
      font-size: 15px;
      line-height: 1.6;
      padding-left: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    a:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    .footer {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
    }

    /* Мобильная адаптация */
    @media (max-width: 640px) {
      .card {
        padding: 28px 20px;
      }

      .contacts {
        flex-direction: column;
        gap: 16px;
        align-items: center;
      }

      .block {
        width: 100%;
        max-width: 220px;
        text-align: center;
        align-items: center;
      }

      .value {
        padding-left: 0;
      }
    }

  </style>
</head>
<body>

<div class="card">

  <div class="icon-wrapper">
    <img src="shield.png" alt="Доступ ограничен">
  </div>

  <h1>Доступ ограничен</h1>

  <div class="subtitle">
    Вход в данный сервис доступен только из защищённой сети.
    Для получения доступа обратитесь в службу поддержки.
  </div>

  <hr>

  <div class="contacts">

    <div class="block">
      <div class="label">
        <img src="mail.png" alt="Email"> ЭЛЕКТРОННАЯ ПОЧТА
      </div>
      <div class="value">
        <a href="mailto:navigator@zabedu.ru">navigator@zabedu.ru</a>
      </div>
    </div>

    <div class="block">
      <div class="label">
        <img src="phone.png" alt="Телефон"> ТЕЛЕФОН
      </div>
      <div class="value">
        <div><a href="tel:+79240208562">+7 (924) 020-85-62</a></div>
        <div><a href="tel:+73022419321">+7 (3022) 41-93-21</a></div>
      </div>
    </div>

  </div>

  <hr>

  <div class="footer">
    Региональный навигатор дополнительного образования
  </div>

</div>

</body>
</html>
